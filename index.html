    .delta{font-size:13px;font-weight:800;display:flex;justify-content:space-between;align-items:center}.up{color:#15803d;background:#dcfce7}.down{color:#b91c1c;background:#fee2e2}.flat{color:#475569;background:#f1f5f9}.delta span{padding:6px 8px;border-radius:8px}
    .grid3{display:grid;grid-template-columns:1fr 1fr .95fr;gap:18px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}

    .insbox{background:#f8fafc;border-radius:14px;padding:16px;margin-top:12px;border:1px solid #eef2f7}.insbox h4{margin:0 0 12px;font-size:14px;color:#64748b;letter-spacing:.08em;text-transform:uppercase}.insbox ul{margin:0;padding-left:18px}.insbox li{margin:10px 0;color:#334155;line-height:1.38}

  </style>
</head>

  { year: '2025', pib: 3.9, patentes: 1.8, salario: 10300, informalidad: 41.6, brechaGenero: 7.5, homicidios: 15.5, percepcionSeguridad: 55.5, viviendasVerticales: 35.0, accidentes: 172.0, corrupcion: 79.5, escolaridad: 9.5, ingresosPropios: 25.5, residuos: 0.85, consumoAgua: 166.8, productoTrabajo: 142.0, ied: 70.5, ocupacionHotelera: 66.5, camasHospital: 10.5, jornadasLargas: 18.0 },
  { year: '2026', pib: 2.4, patentes: 3.0, salario: 10760.5, informalidad: 43.8, brechaGenero: 5.8, homicidios: 11.8, percepcionSeguridad: 56.9, viviendasVerticales: 60.0, accidentes: 165.4, corrupcion: 75.3, escolaridad: 9.9, ingresosPropios: 23.7, residuos: 0.7, consumoAgua: 166.6, productoTrabajo: 138.9, ied: 71, ocupacionHotelera: 68, camasHospital: 10.3, jornadasLargas: 15.3 }
];
const tabs = ['resumen','economia','trabajo','sociedad','infraestructura','gobernanza'];
const labels = {resumen:'Resumen Ejecutivo',economia:'Innovación y Economía',trabajo:'Mercado de Trabajo',sociedad:'Sociedad y M. Ambiente',infraestructura:'Infraestructura Urbana',gobernanza:'Gobernanza y Derecho'};
const themes = {resumen:{c1:'#14b8a6',c2:'#2dd4bf',accent:'#a855f7'},economia:{c1:'#2563eb',c2:'#60a5fa',accent:'#2563eb'},trabajo:{c1:'#ea580c',c2:'#fb923c',accent:'#ea580c'},sociedad:{c1:'#10b981',c2:'#34d399',accent:'#10b981'},infraestructura:{c1:'#52525b',c2:'#a1a1aa',accent:'#52525b'},gobernanza:{c1:'#7c3aed',c2:'#a78bfa',accent:'#7c3aed'}};
const radarData = [{subject:'Innovación/Economía',A:3},{subject:'Infraestructura',A:3},{subject:'Mercado Trabajo',A:2},{subject:'Sociedad/Ambiente',A:3},{subject:'Derecho',A:3},{subject:'Sistema Político',A:1}];
const content=document.getElementById('content'); const tabRow=document.getElementById('tabRow'); const search=document.getElementById('search'); let active='resumen'; let charts={};
for(const t of tabs){const b=document.createElement('div');b.className='tab'+(t===active?' active':'');b.textContent=labels[t];b.onclick=()=>{active=t;render()};tabRow.appendChild(b)}
function pct(v,p){return p===0?0:((v-p)/p*100).toFixed(1)}
function kpi(title,val,unit,trend,prev,inverse=false,icon='') { const change = inverse ? -((val-prev)/prev*100) : ((val-prev)/prev*100); const positive = change>0; const cls = change===0?'flat':positive?'up':'down'; const txt = change===0?'Sin cambios':`${Math.abs(change).toFixed(1)}% ${positive ? (inverse?'reducción':'aumento') : (inverse?'aumento':'reducción')}`; return `<div class='card kpi'><div style='display:flex;justify-content:space-between;align-items:flex-start;gap:10px'><div><div class='label'>${title}</div><div class='value'>${val} <span style='font-size:18px;font-weight:800;color:#64748b'>${unit||''}</span></div></div><div style='width:44px;height:44px;border-radius:12px;background:#f8fafc;display:grid;place-items:center;font-size:20px;color:${theme.accent};font-weight:900;box-shadow:inset 0 1px 0 rgba(255,255,255,.7)'>${icon}</div></div><div class='delta ${cls}'><span>${change===0?'↕':positive?'↗':'↘'} ${txt}</span><span>vs 2024 (${prev})</span></div></div>` }
function chartCard(id,title,desc){return `<div class='panel'><h3>${title}</h3><div class='desc'>${desc}</div><div class='chartbox' id='box-${id}'><canvas id='${id}'></canvas></div></div>`}
function insight(title,icon,imp,act,accent){return `<div class='panel' style='padding-top:14px;border-top:4px solid ${accent}'><h3 style='display:flex;align-items:center;gap:10px'><span style='width:30px;height:30px;border-radius:10px;background:#f8fafc;display:grid;place-items:center;color:${accent}'>${icon}</span>${title}</h3><div class='insbox'><h4>Implicaciones</h4><ul>${imp.map(i=>`<li>${i}</li>`).join('')}</ul></div><div class='insbox' style='margin-top:18px'><h4>Líneas de acción</h4><ul>${act.map(i=>`<li>${i}</li>`).join('')}</ul></div></div>`}
function destroy(){for(const k in charts){charts[k].destroy()} charts={}}
function line(id,labels,data1,data2,c1,c2,opts={}){charts[id]=new Chart(document.getElementById(id),{type:'line',data:{labels,datasets:[{label:data1.name,data:data1.v,borderColor:c1,backgroundColor:c1+'33',fill:true,tension:.35,pointRadius:4,pointHoverRadius:5,borderWidth:4},{label:data2.name,data:data2.v,borderColor:c2,backgroundColor:c2+'33',fill:opts.fill2||false,tension:.35,pointRadius:4,pointHoverRadius:5,borderWidth:4,yAxisID:'y1'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{usePointStyle:true,color:'#8b5cf6',font:{weight:'700',size:13}}}},scales:{y:{beginAtZero:false,grid:{color:'#e2e8f0'}},y1:{position:'right',grid:{drawOnChartArea:false},min:opts.y1min,max:opts.y1max}}}})}
function simpleLine(id,labels,series,c1,opts={}){charts[id]=new Chart(document.getElementById(id),{type:'line',data:{labels,datasets:[{label:series.name,data:series.v,borderColor:c1,backgroundColor:c1+'33',fill:series.fill??true,tension:.35,pointRadius:4,borderWidth:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:opts.legend!==false,position:'bottom',labels:{usePointStyle:true,font:{weight:'700'}}}},scales:{y:{beginAtZero:opts.beginAtZero??false,grid:{color:'#e2e8f0'},min:opts.min,max:opts.max}}}})}
function bar(id,labels,series,c1,opts={}){charts[id]=new Chart(document.getElementById(id),{type:'bar',data:{labels,datasets:[{label:series.name,data:series.v,backgroundColor:c1,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:opts.legend!==false,position:'bottom'}},scales:{y:{beginAtZero:opts.beginAtZero??true,grid:{color:'#e2e8f0'},min:opts.min,max:opts.max}}}})}
function radar(id,data,color){charts[id]=new Chart(document.getElementById(id),{type:'radar',data:{labels:data.map(d=>d.subject),datasets:[{label:'Posición Nacional',data:data.map(d=>d.A),borderColor:color,borderWidth:3,backgroundColor:color+'55',pointBackgroundColor:color,pointRadius:4,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{r:{min:0,max:10,ticks:{stepSize:2,color:'#64748b',font:{weight:'700'}},grid:{color:'#dbe4ee'},angleLines:{color:'#dbe4ee'},pointLabels:{color:'#475569',font:{size:12,weight:'700'}}}}}})}
function render(){document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('active',tabs[i]===active)); const q=search.value.trim().toLowerCase(); const arr=historicalData.filter(r=>!q||Object.keys(r).some(k=>String(r[k]).toLowerCase().includes(q))); const c=arr[arr.length-1], p=arr[arr.length-2]||arr[arr.length-1]; theme=themes[active]; destroy();
let html='';
if(active==='resumen') html=`<div class='kpis'>${kpi('Viviendas Verticales Nuevas',c.viviendasVerticales,'%',pct(c.viviendasVerticales,p.viviendasVerticales),p.viviendasVerticales,true,'⌂')}${kpi('Patentes Registradas',c.patentes,'/100k',pct(c.patentes,p.patentes),p.patentes,false,'▣')}${kpi('Brecha de Ingresos',c.brechaGenero,'%',pct(c.brechaGenero,p.brechaGenero),p.brechaGenero,true,'◔')}${kpi('Mortalidad Infantil',13.9,'/mil',11.2,12.5,false,'⚠')}</div><div class='grid3'><div class='panel'><h3 style='display:flex;align-items:center;gap:10px'><span style='width:28px;height:28px;border-radius:10px;background:#f8fafc;display:grid;place-items:center;color:${theme.accent}'>ⓘ</span>Derecho y Sistema Político</h3><div class='insbox'><h4>Implicaciones</h4><ul><li>Liderazgo en gobernanza (Posición 1). Buena reputación de integridad.</li><li>Caída en ingresos propios sugiere menor esfuerzo recaudatorio, riesgo fiscal a futuro.</li><li>Entorno más estable: baja en homicidios y robos atrae inversión.</li><li>Aumento en mortalidad infantil (13.9) muestra alerta en sectores vulnerables.</li></ul></div><div class='insbox' style='margin-top:18px'><h4>Líneas de acción</h4><ul><li>Estrategia de fortalecimiento fiscal local (Catastros, predial).</li><li>Programa intersectorial urgente de salud materno-infantil.</li><li>Profundizar policía de proximidad e inteligencia contra robos.</li></ul></div></div><div class='panel'><h3>Finanzas y Transparencia</h3><div class='desc'>Ingresos Propios vs Percepción de Corrupción.</div><div class='chartbox tall'><canvas id='fin'></canvas></div></div><div class='panel'><h3>Seguridad Pública</h3><div class='desc'>Evolución de percepción de seguridad.</div><div class='chartbox tall'><canvas id='seg'></canvas></div></div></div>`;
if(active==='economia') html=`<div class='kpis'>${kpi('Centros de Investigación',1.1,'/100k',57.1,0.7,false,'▣')}${kpi('Patentes Registradas',c.patentes,'/100k',pct(c.patentes,p.patentes),p.patentes,false,'▣')}${kpi('Inversión Extranjera',c.ied,'MDD',1.4,70,false,'◌')}${kpi('Ocupación Hotelera',c.ocupacionHotelera,'%',4.0,65.4,false,'⌂')}</div><div class='grid3'><div class='panel'><h3 style='display:flex;align-items:center;gap:10px'><span style='width:28px;height:28px;border-radius:10px;background:#f8fafc;display:grid;place-items:center;color:${theme.accent}'>ⓘ</span>Innovación y Economía</h3><div class='insbox'><h4>Implicaciones</h4><ul><li>Activo estratégico en conocimiento: crecimiento acelerado de patentes (3.0 vs 0.7).</li><li>Turismo y negocios en recuperación sólida (ocupación 68%).</li><li>La diversificación económica cayó ligeramente (477 sectores), riesgo de concentración productiva.</li></ul></div><div class='insbox' style='margin-top:18px'><h4>Líneas de acción</h4><ul><li>Construir cluster de innovación aplicada integrando universidades y manufactura.</li><li>Programas municipales de innovación abierta mediante retos públicos.</li><li>Atraer cadenas logísticas y pymes de software para diversificar.</li></ul></div></div><div class='panel'><h3>Desarrollo de Propiedad Intelectual</h3><div class='desc'>Patentes por cada 100 mil en la PEA.</div><div class='chartbox tall'><canvas id='pat'></canvas></div></div><div class='panel'><h3>Turismo y Relaciones Internacionales</h3><div class='desc'>Ocupación Hotelera % vs Inversión Neta (MDD).</div><div class='chartbox tall'><canvas id='tur'></canvas></div></div></div>`;
